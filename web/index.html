<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Time Archival 3DGS — Realtime Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html,body { height:100%; margin:0; background:#111; color:#eee; font-family:system-ui,Segoe UI,Roboto,Arial; }
  #topbar { position:fixed; left:0; right:0; top:0; padding:8px 12px; display:flex; gap:12px; align-items:center; background:rgba(0,0,0,.45); backdrop-filter: blur(8px); z-index: 10; }
  #canvas { position:fixed; inset:0; width:100%; height:100%; object-fit:contain; }
  .row { display:flex; align-items:center; gap:8px; }
  .sep { width:1px; height:24px; background:#444; }
  input[type=range] { width: 280px; }
  .pill { background:#222; padding:6px 10px; border-radius:10px; }
  button { background:#2b2b2b; color:#eee; border:1px solid #444; padding:6px 10px; border-radius:8px; cursor:pointer; }
  button:active { transform: translateY(1px); }
  a { color:#9cf; }
</style>
</head>
<body>
  <img id="canvas" alt="frame"/>

  <div id="topbar">
    <div class="row">
      <label>Frame</label>
      <input id="frame" type="range" min="0" max="1" value="0" />
      <span id="frameVal" class="pill">0</span>
      <button id="play">▶</button>
      <span class="sep"></span>
      <label>Res</label>
      <select id="res">
        <option value="1280x720">1280×720</option>
        <option value="960x540" selected>960×540</option>
        <option value="800x450">800×450</option>
        <option value="640x360">640×360</option>
      </select>
      <label>Format</label>
      <select id="fmt">
        <option value="jpeg" selected>JPEG</option>
        <option value="png">PNG</option>
      </select>
      <label><input id="bg" type="checkbox"> white bg</label>
      <span class="sep"></span>
      <span class="pill">Click canvas → mouse look | WASD move | Q/E up/down | Wheel FOV | <b>H</b> home</span>
    </div>
  </div>

<script>
(async () => {
  // 若你的服务不在同域，这里可填完整地址，如 'http://127.0.0.1:7860'
  const SERVER = '';
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  const imgEl = document.getElementById('canvas');
  const frameSlider = document.getElementById('frame');
  const frameVal = document.getElementById('frameVal');
  const playBtn = document.getElementById('play');
  const resSel = document.getElementById('res');
  const fmtSel = document.getElementById('fmt');
  const bgChk = document.getElementById('bg');

  // health
  let FRAMES = [];
  let HOME_CAM = null;
  try {
    const h = await fetch(`${SERVER}/health`).then(r=>r.json());
    FRAMES = h.frames || [];
    HOME_CAM = h.default_camera || null;
  } catch (e) { console.warn(e); }
  if (FRAMES.length === 0) { FRAMES = [1]; }

  frameSlider.min = String(FRAMES[0]);
  frameSlider.max = String(FRAMES[FRAMES.length-1]);
  frameSlider.value = String(FRAMES[0]);
  frameVal.textContent = frameSlider.value;

  let playing = false;
  let lastReq = 0;
  let inflightCtrl = null;

  // camera state (freecam)
  let pos = [0, 0, 3];  // world pos
  let yaw = 0.0, pitch = 0.0;
  let fovxDeg = 60;

  // 初次渲染优先使用 home camera
  let useHomeNext = !!HOME_CAM;

  const keys = new Set();
  let lastTick = performance.now();

  imgEl.addEventListener('click', () => {
    imgEl.requestPointerLock?.();
  });
  document.addEventListener('mousemove', (e) => {
    if (document.pointerLockElement !== imgEl) return;
    const sens = 0.0025;
    yaw   -= e.movementX * sens;
    pitch -= e.movementY * sens;
    const limit = Math.PI/2 - 0.001;
    pitch = Math.max(-limit, Math.min(limit, pitch));
    scheduleRender();
  });
  document.addEventListener('wheel', (e) => {
    fovxDeg = Math.max(30, Math.min(100, fovxDeg + Math.sign(e.deltaY)*2));
    scheduleRender();
  }, {passive:true});
  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    keys.add(k);
    if (k === ' ') togglePlay();
    if (k === 'h') { useHomeNext = !!HOME_CAM; scheduleRender(); } // 回到 home 位姿
  });
  document.addEventListener('keyup',   (e) => { keys.delete(e.key.toLowerCase()); });

  function step(dt) {
    const speed = (keys.has('shift') ? 4.0 : 1.5) * dt;
    const fwd = [ -Math.sin(yaw)*Math.cos(pitch),  Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch) ];
    const right = [ Math.cos(yaw), 0, -Math.sin(yaw) ];
    const up = [0,1,0];
    if (keys.has('w')) pos = add(pos, scale(fwd,  speed));
    if (keys.has('s')) pos = add(pos, scale(fwd, -speed));
    if (keys.has('a')) pos = add(pos, scale(right, -speed));
    if (keys.has('d')) pos = add(pos, scale(right,  speed));
    if (keys.has('q')) pos = add(pos, scale(up,   -speed));
    if (keys.has('e')) pos = add(pos, scale(up,    speed));
  }
  function add(a,b){ return [a[0]+b[0],a[1]+b[1],a[2]+b[2]]; }
  function scale(a,s){ return [a[0]*s,a[1]*s,a[2]*s]; }

  function currentCamera(width, height) {
    const yawC = Math.cos(yaw), yawS = Math.sin(yaw);
    const pitchC = Math.cos(pitch), pitchS = Math.sin(pitch);
    const cx = [ yawC, 0, -yawS ];
    const cy = [ yawS*pitchS, pitchC, yawC*pitchS ];
    const cz = [ yawS*pitchC, -pitchS, yawC*pitchC ];  // forward
    const Rwc = [
      cx[0], cy[0], cz[0],
      cx[1], cy[1], cz[1],
      cx[2], cy[2], cz[2],
    ];
    const T_wc = pos;
    const Twc = [
      -(Rwc[0]*T_wc[0] + Rwc[1]*T_wc[1] + Rwc[2]*T_wc[2]),
      -(Rwc[3]*T_wc[0] + Rwc[4]*T_wc[1] + Rwc[5]*T_wc[2]),
      -(Rwc[6]*T_wc[0] + Rwc[7]*T_wc[1] + Rwc[8]*T_wc[2]),
    ];
    const R = [
      Rwc[0], Rwc[3], Rwc[6],
      Rwc[1], Rwc[4], Rwc[7],
      Rwc[2], Rwc[5], Rwc[8],
    ];
    const fovx = fovxDeg * Math.PI/180;
    const fx = width / (2*Math.tan(fovx/2));
    const fy = fx;
    const cxp = width * 0.5, cyp = height * 0.5;
    return { width, height, fx, fy, cx: cxp, cy: cyp, R, T: Twc, znear: 0.01, zfar: 100.0 };
  }

  function scaledCam(cam, w, h) {
    const sw = w / cam.width, sh = h / cam.height;
    return {
      width: w, height: h,
      fx: cam.fx * sw, fy: cam.fy * sh,
      cx: cam.cx * sw, cy: cam.cy * sh,
      R: cam.R, T: cam.T,
      znear: cam.znear ?? 0.01, zfar: cam.zfar ?? 100.0
    };
  }

  function togglePlay() { playing = !playing; playBtn.textContent = playing ? '⏸' : '▶'; }
  playBtn.addEventListener('click', togglePlay);
  frameSlider.addEventListener('input', () => { frameVal.textContent = frameSlider.value; scheduleRender(); });
  resSel.addEventListener('change', scheduleRender);
  fmtSel.addEventListener('change', scheduleRender);
  bgChk.addEventListener('change', scheduleRender);

  function scheduleRender() {
    const now = performance.now();
    if (now - lastReq < 66) return; // ~15Hz throttle
    lastReq = now;
    requestFrame();
  }

  async function requestFrame() {
    const [rw, rh] = resSel.value.split('x').map(x => Math.round(parseInt(x,10) * DPR));
    let cam;
    if (useHomeNext && HOME_CAM) {
      cam = scaledCam(HOME_CAM, rw, rh);
      useHomeNext = false;
    } else {
      cam = currentCamera(rw, rh);
    }
    const payload = {
      frame: parseInt(frameSlider.value, 10),
      format: fmtSel.value,
      white_background: bgChk.checked,
      camera: cam
    };
    if (inflightCtrl) inflightCtrl.abort();
    inflightCtrl = new AbortController();
    try {
      const resp = await fetch(`${SERVER}/render`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload),
        signal: inflightCtrl.signal
      });
      if (!resp.ok) throw new Error(await resp.text());
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      imgEl.src = url;
      imgEl.onload = () => URL.revokeObjectURL(url);
    } catch (e) {
      if (e.name !== 'AbortError') console.warn(e);
    }
  }

  function loop() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastTick)/1000);
    lastTick = now;

    if (playing) {
      const cur = parseInt(frameSlider.value,10);
      const min = parseInt(frameSlider.min,10);
      const max = parseInt(frameSlider.max,10);
      frameSlider.value = String(cur < max ? cur+1 : min);
      frameVal.textContent = frameSlider.value;
    }
    if (keys.size > 0 || playing) {
      step(dt);
      scheduleRender();
    }
    requestAnimationFrame(loop);
  }

  // 初次渲染
  scheduleRender();
  loop();
})();
</script>
</body>
</html>

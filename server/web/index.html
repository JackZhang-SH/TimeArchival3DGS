<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Time Archival 3DGS — Realtime Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html,body { height:100%; margin:0; background:#111; color:#eee; font-family:system-ui,Segoe UI,Roboto,Arial; }
  #topbar { position:fixed; left:0; right:0; top:0; padding:8px 12px; display:flex; gap:12px; align-items:center; background:rgba(0,0,0,.45); backdrop-filter: blur(8px); z-index:10; }
  #canvas { position:fixed; inset:0; width:100%; height:100%; object-fit:contain; }
  .row { display:flex; align-items:center; gap:8px; }
  .sep { width:1px; height:24px; background:#444; }
  input[type=range] { width: 280px; }
  .pill { background:#222; padding:6px 10px; border-radius:10px; }
  button { background:#2b2b2b; color:#eee; border:1px solid #444; padding:6px 10px; border-radius:8px; cursor:pointer; }
  button:active { transform: translateY(1px); }
  select, input[type=checkbox] { cursor:pointer; }
</style>
</head>
<body>
  <img id="canvas" alt="frame"/>

  <div id="topbar">
    <div class="row">
      <label>Frame</label>
      <input id="frame" type="range" min="0" max="1" value="0" />
      <span id="frameVal" class="pill">0</span>
      <button id="play">▶</button>
      <span class="sep"></span>
      <label>Res</label>
      <select id="res">
        <option value="1280x720">1280×720</option>
        <option value="960x540" selected>960×540</option>
        <option value="800x450">800×450</option>
        <option value="640x360">640×360</option>
      </select>
      <label>Format</label>
      <select id="fmt">
        <option value="jpeg" selected>JPEG</option>
        <option value="png">PNG</option>
      </select>
      <label><input id="bg" type="checkbox"> white bg</label>
      <span id="stats" class="pill">Load — ms | H2D — ms | Render — ms | Enc — ms | Total — ms | cache —</span>

      <span class="sep"></span>
      <!-- English UI hint -->
      <span class="pill">Arrows: look (←/→ yaw, ↑/↓ pitch) | WASD: move (relative to view) | Q/E: up/down | Scroll: FOV | Space: Play/Pause | Shift: fast</span>
    </div>
  </div>

<script>
(async () => {
  'use strict';

  const SERVER = '';                       // same-origin
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  const imgEl = document.getElementById('canvas');
  const frameSlider = document.getElementById('frame');
  const frameVal = document.getElementById('frameVal');
  const playBtn = document.getElementById('play');
  const resSel = document.getElementById('res');
  const fmtSel = document.getElementById('fmt');
  const bgChk = document.getElementById('bg');
  const statsEl = document.getElementById('stats');

  // --- Fetch frame list from server health ---
  let FRAMES = [];
  try {
    const h = await fetch(`${SERVER}/health`).then(r=>r.json());
    FRAMES = Array.isArray(h.frames) ? h.frames : [];
  } catch (e) {
    console.warn(e);
  }
  if (FRAMES.length === 0) FRAMES = [1];

  // Map frame id -> index for robust advancing
  const FRAME_IDX = new Map(FRAMES.map((f,i)=>[f,i]));
  console.log('[Init] FRAMES:', FRAMES);

  // Slider mirrors the factual frame id (we snap on input)
  frameSlider.min = String(FRAMES[0]);
  frameSlider.max = String(FRAMES[FRAMES.length-1]);
  console.log('[Init] slider range:', frameSlider.min, '→', frameSlider.max);

  // Single source of truth for current frame
  let currentFrameId = FRAMES[0];
  frameSlider.value = String(currentFrameId);
  frameVal.textContent = frameSlider.value;

  // --- Camera state ---
  // Position in world space, yaw/pitch in radians; FOV is horizontal
  let pos = [0, 0, 3];
  let yaw = 0.0, pitch = 0.0;
  let fovxDeg = 60;

  // Pressed key set (lower-case strings, e.g. 'w','arrowleft','shift')
  const keys = new Set();
  let lastTick = performance.now();

  // --- Helpers ---
  function clamp(x,a,b){ return Math.max(a,Math.min(b,x)); }
  function add(a,b){ return [a[0]+b[0],a[1]+b[1],a[2]+b[2]]; }
  function scale(a,s){ return [a[0]*s,a[1]*s,a[2]*s]; }

  // --- Input: wheel -> FOV ---
  // Mouse-look is intentionally DISABLED to reduce motion sickness.
  // Only wheel is used for FOV adjustments.
  document.addEventListener('wheel', (e) => {
    fovxDeg = clamp(fovxDeg + Math.sign(e.deltaY)*2, 30, 100);
    markCameraDirty();
  }, {passive:true});

  // --- Input: keyboard ---
  // Arrow keys rotate the camera; WASD/QE move relative to camera forward/right/up.
  // Space toggles playback. We avoid capturing keys while focus is inside inputs/selects.
  document.addEventListener('keydown', (e) => {
    const tag = (e.target && e.target.tagName ? e.target.tagName : '').toLowerCase();
    if (tag === 'input' || tag === 'select' || tag === 'textarea') return;

    const kRaw = e.key;               // e.g. 'ArrowLeft', 'w', ' '
    const k = kRaw.toLowerCase();     // normalize for the keys Set

    if (kRaw.startsWith('Arrow') || kRaw === ' ') e.preventDefault();
    keys.add(k);

    if (kRaw === ' ') togglePlay();
  });

  document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    keys.delete(k);
  });
  function step(dt) {
    const speed = (keys.has('shift') ? 4.0 : 1.5) * dt;

    // Keep movement basis consistent with the camera matrix:
    // Use cz as "forward" (camera looks along +Z), cx as "right", world +Y as "up".
    const fwd   = [ Math.sin(yaw) * Math.cos(pitch),  -Math.sin(pitch),  Math.cos(yaw) * Math.cos(pitch) ]; // == cz
    const right = [ Math.cos(yaw), 0, -Math.sin(yaw) ];  // == cx (independent of pitch)
    const up    = [ 0, 1, 0 ];                           // world up

    if (keys.has('w')) pos = add(pos, scale(fwd,  speed));
    if (keys.has('s')) pos = add(pos, scale(fwd, -speed));
    if (keys.has('a')) pos = add(pos, scale(right, -speed)); // strafe left
    if (keys.has('d')) pos = add(pos, scale(right,  speed)); // strafe right
    if (keys.has('q')) pos = add(pos, scale(up,   -speed));  // down
    if (keys.has('e')) pos = add(pos, scale(up,    speed));  // up
  }

  // --- Rotation step: Arrow keys -> yaw/pitch ---
function stepRot(dt) {
  const rotSpeed = (keys.has('shift') ? 1.8 : 1.2); // radians per second
  let changed = false;

  if (keys.has('arrowleft'))  { yaw += rotSpeed * dt; changed = true; } // ← 左转
  if (keys.has('arrowright')) { yaw -= rotSpeed * dt; changed = true; } // → 右转

  if (keys.has('arrowup'))    { pitch -= rotSpeed * dt; changed = true; } // ↑ 抬头
  if (keys.has('arrowdown'))  { pitch += rotSpeed * dt; changed = true; } // ↓ 低头

  const limit = Math.PI/2 - 0.001;   // clamp to avoid gimbal flip
  if (pitch >  limit) pitch =  limit;
  if (pitch < -limit) pitch = -limit;

  return changed;
}


  // --- Build current camera payload for server ---
function currentCamera(width, height) {
  const cy = Math.cos(yaw),  sy = Math.sin(yaw);
  const cp = Math.cos(pitch), sp = Math.sin(pitch);

  // Camera axes in world space (camera-to-world)
  // right (cx), up (cy_axis), forward (cz)
  const cx_axis = [  cy,       0,  -sy ];
  const cy_axis = [  sy*sp,    cp,  cy*sp ];
  const cz_axis = [  sy*cp,   -sp,  cy*cp ];

  // camera->world (row-major, columns are cx,cy,cz)
  const Rcw = [
    cx_axis[0], cy_axis[0], cz_axis[0],
    cx_axis[1], cy_axis[1], cz_axis[1],
    cx_axis[2], cy_axis[2], cz_axis[2],
  ];
  // world->camera = transpose(camera->world), row-major
  const Rwc = [
    cx_axis[0], cx_axis[1], cx_axis[2],
    cy_axis[0], cy_axis[1], cy_axis[2],
    cz_axis[0], cz_axis[1], cz_axis[2],
  ];

  // T(world->camera) = -Rwc * C , C = camera center in world = pos
  const T = [
    -(Rwc[0]*pos[0] + Rwc[1]*pos[1] + Rwc[2]*pos[2]),
    -(Rwc[3]*pos[0] + Rwc[4]*pos[1] + Rwc[5]*pos[2]),
    -(Rwc[6]*pos[0] + Rwc[7]*pos[1] + Rwc[8]*pos[2]),
  ];

  // intrinsics from horizontal FOV (square pixels)
  const fovx = fovxDeg * Math.PI/180;
  const fx = width / (2 * Math.tan(fovx/2));
  const fy = fx;
  const cxp = width * 0.5, cyp = height * 0.5;

  // IMPORTANT: send world->camera extrinsics
  return { width, height, fx, fy, cx: cxp, cy: cyp, R: Rwc, T, znear: 0.01, zfar: 100.0 };
}


  // ---------------------------
  // Serial rendering with back-pressure
  // ---------------------------
  let playing = false;           // auto-advance flag
  let inflight = false;          // a render is in progress
  let cameraDirty = true;        // camera changed since last render
  let queuedFrame = null;        // explicit frame requested (by UI or player)

  function togglePlay() {
    playing = !playing;
    playBtn.textContent = playing ? '⏸' : '▶';
    if (playing) {
      queueFrame(currentFrameId);  // start from the current factual frame
      pump();
    }
  }
  playBtn.addEventListener('click', togglePlay);

  frameSlider.addEventListener('input', () => {
    // Snap slider to nearest valid frame id (supports non-contiguous ids)
    const v = parseInt(frameSlider.value, 10);
    let nearest = FRAMES[0], best = Math.abs(FRAMES[0]-v);
    for (let i=1;i<FRAMES.length;i++){
      const d = Math.abs(FRAMES[i]-v);
      if (d < best) { best = d; nearest = FRAMES[i]; }
    }
    currentFrameId = nearest;
    frameSlider.value = String(nearest);
    frameVal.textContent = frameSlider.value;

    // Manual seek stops autoplay
    playing = false;
    playBtn.textContent = '▶';

    queueFrame(currentFrameId);
    pump();
  });

  resSel.addEventListener('change', () => { cameraDirty = true; pump(); });
  fmtSel.addEventListener('change',  () => { cameraDirty = true; pump(); });
  bgChk.addEventListener('change',   () => { cameraDirty = true; pump(); });

  function markCameraDirty(){ cameraDirty = true; pump(); }
  function queueFrame(f){ queuedFrame = f; }

  async function pump() {
    if (inflight) return;                 // one at a time
    const target = decideNextTarget();
    if (target === null) return;
    inflight = true;
    try {
      await renderOne(target);

      // Update factual current frame after successful render
      currentFrameId = target;
      frameSlider.value = String(target);
      frameVal.textContent = frameSlider.value;

      if (playing) {
        if (FRAMES.length > 1) {
          const idx = FRAME_IDX.get(target) ?? 0;
          const next = FRAMES[(idx + 1) % FRAMES.length];
          console.log(`[Player] advance ${target} -> ${next}`);
          queueFrame(next);
        } else {
          playing = false;
          playBtn.textContent = '▶';
          console.log('[Player] only one frame, stop.');
        }
      } else if (cameraDirty) {
        // Not playing: if camera changed, re-render current frame once
        queueFrame(currentFrameId);
      }
    } catch (e) {
      console.warn(e);
    } finally {
      inflight = false;
      const hasMore = (queuedFrame !== null) || cameraDirty;
      console.log(`[Pump] done f=${target} | playing=${playing} | queued=${queuedFrame} | cameraDirty=${cameraDirty}`);
      if (hasMore) pump();
    }
  }

  function decideNextTarget(){
    if (queuedFrame !== null) { const f = queuedFrame; queuedFrame = null; return f; }
    if (cameraDirty) { cameraDirty = false; return currentFrameId; }
    return null;
  }

  async function renderOne(frameId) {
    const [rw, rh] = resSel.value.split('x').map(x => Math.round(parseInt(x,10) * DPR));
    const cam = currentCamera(rw, rh);
    const payload = {
      frame: frameId,
      format: fmtSel.value,
      white_background: bgChk.checked,
      camera: cam
    };

    // Client-side timer
    const t_client0 = performance.now();

    // Stage 1: load to GPU (blocking until H2D done)
    let loadMs = null, loadCache = null;
    try {
      const loadResp = await fetch(`${SERVER}/load`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ frame: frameId }) });
      loadMs = loadResp.headers.get('X-Load-ms');
      loadCache = loadResp.headers.get('X-Cache');
      console.log(`[Client] /load f=${frameId} | cache=${loadCache} | H2D+wait=${loadMs} ms`);
    } catch (e) {
      console.warn(`[Client] /load f=${frameId} failed`, e);
    }

    // Stage 2: render
    const resp = await fetch(`${SERVER}/render`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    if (!resp.ok) throw new Error(await resp.text());

    const h2d = resp.headers.get('X-H2D-ms');
    const ren = resp.headers.get('X-Render-ms');
    const enc = resp.headers.get('X-Encode-ms');
    const tot = resp.headers.get('X-RT-ms');
    const cch = resp.headers.get('X-Cache');
    const frm = resp.headers.get('X-Frame');

    console.log(`[Client] /render f=${frm} | cache=${cch} | H2D=${h2d} | render=${ren} | encode=${enc} | total=${tot} ms`);

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    imgEl.src = url;
    imgEl.onload = () => URL.revokeObjectURL(url);

    const clientTotal = (performance.now() - t_client0).toFixed(1);
    if (statsEl) {
      statsEl.textContent = `Load ${loadMs || '—'} ms | H2D ${h2d || '—'} ms | Render ${ren || '—'} ms | Enc ${enc || '—'} ms | Total ${tot || clientTotal} ms | cache ${cch || loadCache || '—'}`;
    }
  }

  // Drive camera motion intent only; rendering is demand-driven via pump()
  function loop() {
    const now = performance.now();
    const dt = Math.min(0.05, (now - lastTick)/1000);
    lastTick = now;

    if (keys.size > 0) {
      // Movement in camera-relative axes; rotation via Arrow keys
      step(dt);
      const rotated = stepRot(dt);
      if (rotated) cameraDirty = true;
      markCameraDirty();
    }
    requestAnimationFrame(loop);
  }
  loop();

  // Initial render once page loads
  queueFrame(currentFrameId);
  pump();
})();
</script>

</body>
</html>
